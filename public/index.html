<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微博 Agent 工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="brand-block">
          <p class="eyebrow">微博单平台 MVP</p>
          <h1>微博 Agent 工作台</h1>
        </div>
        <div class="status-strip">
          <span id="connectionDot" class="dot"></span>
          <span id="connectionText">连接中</span>
          <time id="generatedAt"></time>
          <a class="nav-link" href="/settings">后台设置</a>
        </div>
      </header>

      <p id="lastAction" class="action-status">等待操作。目标来自微博真实搜索结果，推荐依据会显示在每张卡片里。</p>

      <section id="weiboWorkbench" class="workbench-grid">
        <article class="panel focus-panel">
          <header><h2>推荐采集目标</h2><span>微博搜索 / 选择后采评论</span></header>
          <div id="recommendedTargets" class="list target-list"></div>
        </article>

        <section class="side-stack">
          <article class="panel">
            <header><h2>微博事件</h2><span>线索 / 正式事件</span></header>
            <div id="events" class="list"></div>
          </article>

          <article class="panel">
            <header><h2>待确认行动</h2><span>人工确认</span></header>
            <div id="pendingActions" class="list"></div>
          </article>
        </section>
      </section>

      <section class="evidence-grid">
        <article class="panel">
          <header><h2>数据缺口</h2><span>不编造</span></header>
          <div id="dataGaps" class="list"></div>
        </article>

        <article class="panel">
          <header><h2>证据引用</h2><span>来源 ID</span></header>
          <div id="citations" class="list"></div>
        </article>

        <article class="panel wide qa-panel">
          <header><h2>证据问答</h2><span>只答已有微博记录</span></header>
          <div class="qa-row">
            <textarea id="botQuestion">微博负面为什么升高？</textarea>
            <button id="sendBotMessage">提问</button>
          </div>
          <p id="botAnswer" class="strategy-summary"></p>
        </article>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
