<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>微博 Agent 工作台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Weibo MVP · Haidao Public Opinion Agent</p>
          <h1>微博 Agent 工作台</h1>
          <p class="subtitle">围绕《海岛舒服日志》、刘昊然、李兰迪的微博真实证据、Agent 判断、行动确认和可追溯问答。</p>
        </div>
        <div class="status-strip">
          <span id="connectionDot" class="dot"></span>
          <span id="connectionText">连接中</span>
          <time id="generatedAt"></time>
        </div>
      </section>

      <section id="weiboWorkbench" class="workspace">
        <aside class="control-panel">
          <label>项目名称<input id="projectName" value="海岛舒服日志" readonly /></label>
          <label>当前平台<input id="activePlatform" value="微博" readonly /></label>
          <label>发现关键词<input id="discoveryKeyword" value="刘昊然 李兰迪 海岛舒服日志" /></label>
          <div class="platform-lock">
            <span>微博</span>
          </div>
          <button id="runDiscovery">创建微博发现任务</button>
          <button id="runMigrate" class="secondary">初始化 MySQL 表</button>
          <p id="lastAction" class="control-note">MVP 只展示微博链路；无 MySQL、MediaCrawler 或登录态时显示阻塞原因，不生成模拟建议。</p>
        </aside>

        <section class="dashboard workbench-grid">
          <article class="panel">
            <header><h2>系统状态</h2><span id="partialState">读取中</span></header>
            <div id="setupStatus" class="status-grid"></div>
          </article>
          <article class="panel">
            <header><h2>Agent 判断</h2><span>证据优先</span></header>
            <div id="judgments" class="list"></div>
          </article>
          <article class="panel wide">
            <header><h2>推荐采集目标</h2><span>选择后再采评论</span></header>
            <div id="recommendedTargets" class="list target-list"></div>
          </article>
        </section>
      </section>

      <section class="insight-grid">
        <article class="panel">
          <header><h2>微博事件</h2><span>线索 / 正式事件</span></header>
          <div id="events" class="list"></div>
        </article>
        <article class="panel">
          <header><h2>待确认行动</h2><span>人工确认后回测</span></header>
          <div id="pendingActions" class="list"></div>
        </article>
        <article class="panel">
          <header><h2>数据缺口</h2><span>不编造下游结果</span></header>
          <div id="dataGaps" class="list"></div>
        </article>
        <article class="panel">
          <header><h2>证据引用</h2><span>回答来源</span></header>
          <div id="citations" class="list"></div>
        </article>
        <article class="panel wide">
          <header><h2>证据问答</h2><span>只答已有微博记录</span></header>
          <div class="qa-row">
            <input id="botQuestion" value="微博负面为什么升高？" />
            <button id="sendBotMessage">提问</button>
          </div>
          <p id="botAnswer" class="strategy-summary"></p>
        </article>
      </section>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
